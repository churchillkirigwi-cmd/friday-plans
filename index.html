<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e8,#fff8f2);
}

/* CARD */
.card{
    width:420px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(15px);
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h2{
    color:#d63384;
    font-size:28px;
    margin-bottom:30px;
    line-height:1.4;
}

/* BUTTON */
.btn{
    padding:14px 35px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#ff6fa5;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

/* NO BUTTON */
#noBtn{
    background:white;
    color:#444;
    position:fixed;
    transition:left .2s ease, top .2s ease;
    z-index:5;
}

/* LOADING */
.loading-container{
    width:300px;
    height:16px;
    background:#ffe4ef;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.loading-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff6fa5,#ffb6c1);
}

</style>
</head>

<body>

<div class="card">
    <h2>Do you want to spend Friday night with me (tomorrow)? 💕</h2>

    <button id="yesBtn" class="btn">Yes</button>
</div>

<button id="noBtn" class="btn">No</button>

<script>

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");

/* =========================
   POSITION NO BUTTON NEXT TO YES
========================= */
window.addEventListener("load", () => {

    const yesRect = yesBtn.getBoundingClientRect();

    noBtn.style.left = (yesRect.right + 20) + "px";
    noBtn.style.top = (yesRect.top + yesRect.height / 2) + "px";
});

/* =========================
   NO BUTTON RUN AWAY (SAFE)
========================= */
document.addEventListener("mousemove",(e)=>{

    const rect=noBtn.getBoundingClientRect();

    const btnX=rect.left + rect.width/2;
    const btnY=rect.top + rect.height/2;

    const dx=btnX - e.clientX;
    const dy=btnY - e.clientY;

    const distance=Math.sqrt(dx*dx + dy*dy);

    if(distance < 140){

        const moveX = dx / distance;
        const moveY = dy / distance;

        const escape = 110;

        let x = rect.left + moveX * escape;
        let y = rect.top + moveY * escape;

        const padding = 15;

        const maxX = window.innerWidth - rect.width - padding;
        const maxY = window.innerHeight - rect.height - padding;

        x = Math.max(padding, Math.min(maxX, x));
        y = Math.max(padding, Math.min(maxY, y));

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        noBtn.style.position = "fixed";
    }

});


/* =========================
   YES BUTTON TRANSITION
========================= */
yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div id="loadScreen"
style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd6e8,#fff8f2);
opacity:0;
transition:opacity .8s;
">

<h1 style="color:#d63384;margin-bottom:20px;">
I knew you wouldn't say no 😂💕
</h1>

<div class="loading-container">
    <div class="loading-bar" id="bar"></div>
</div>

<p id="text" style="margin-top:20px;color:#555;">
Getting everything ready... 💕
</p>

</div>

`;

const screen=document.getElementById("loadScreen");
const bar=document.getElementById("bar");
const text=document.getElementById("text");

setTimeout(()=>screen.style.opacity="1",50);

const messages=[
"Getting everything ready... 💕",
"Preparing surprises... 🎁",
"Making it special... 🌸",
"Almost there... ❤️"
];

let progress=0;
let msg=0;

const load=setInterval(()=>{

progress++;
bar.style.width=progress+"%";

if(progress%25===0 && msg<messages.length-1){
msg++;
text.innerHTML=messages[msg];
}

if(progress>=100){

clearInterval(load);

screen.style.opacity="0";

setTimeout(()=>{

window.location.href="page2.html";

},800);

}

},30);

});

</script>

</body>
</html>
